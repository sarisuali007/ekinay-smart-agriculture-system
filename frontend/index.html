<!DOCTYPE html>
<html lang="tr">
<head>

    <meta charset="UTF-8">
    <title>Ekinay Panel</title>

<style>
    body {
        font-family: Arial;
        margin: 40px;
    }
    input {
        margin: 5px;
        padding: 5px;
    }
    button {
        margin: 5px;
        padding: 5px 10px;
    }
    h2 {
        margin-top: 30px;
    }
</style>

</head>
<body>
    
    <h1>Ekinay Tarım Sistemi</h1>
    <div id="messageBox"></div>

    <!-- Kullanıcı Kaydı Formu -->
    <h2>Kullanıcı Kaydı</h2>
    <input type="text" id="registerName" placeholder="Ad">
    <input type="email" id="registerEmail" placeholder="Email">
    <input type="password" id="registerPassword" placeholder="Şifre">
    <button onclick="register()">Kayıt Ol</button>

    <!-- Kullanıcı Girişi Formu -->
    <h2>Kullanıcı Girişi</h2>
    <input type="email" id="loginEmail" placeholder="Email">
    <input type="password" id="loginPassword" placeholder="Şifre">
    <button onclick="login()">Giriş Yap</button>

    <!-- Profil Güncelleme Formu -->
    <h2>Profil Güncelle</h2>
    <input id="updateName" placeholder="Yeni Ad">
    <input id="updateEmail" placeholder="Yeni Email">
    <input id="updatePassword" placeholder="Yeni Şifre">
    <button onclick="updateProfile()">Profili Güncelle</button>
    <button onclick="deleteProfile()">Profili Sil</button>


    <!-- Tarla Ekle -->
    <h2>Tarla Ekle</h2>
    <input id="fieldName" placeholder="Tarla Adı">
    <input id="fieldLocation" placeholder="Konum">
    <button onclick="addField()">Ekle</button>

    <!-- Tarla Listesi -->
    <h2>Tarlaları Listele</h2>
    <button onclick="getFields()">Listele</button>
    <ul id="fieldList"></ul>

    <!-- Tarla Güncelle -->
    <h2>Tarla Güncelle</h2>
    <select id="updateFieldSelect"></select>
    <input id="updateFieldName" placeholder="Yeni Tarla Adı">
    <input id="updateFieldLocation" placeholder="Yeni Konum">
    <button onclick="updateField()">Tarlayı Güncelle</button>
    <button onclick="deleteField()">Tarlayı Sil</button>

    <!-- Ürün Ekle -->
    <h2>Ürün Ekle</h2>
    <input id="cropName" placeholder="Ürün">
    <select id="cropFieldSelect"></select>
    <button onclick="addCrop()">Ekle</button>

    <!-- Ürün Güncelle -->
    <h2>Ürün Güncelle</h2>
    <select id="updateCropSelect"></select>
    <input id="updateCropName" placeholder="Yeni Ürün Adı">
    <select id="updateCropFieldSelect"></select>
    <button onclick="updateCrop()">Ürünü Güncelle</button>
    <button onclick="deleteCrop()">Ürünü Sil</button>

    <!---Öneri Al-->
    <h2>Sulama Önerisi</h2>
    <select id="irrigationFieldSelect"></select>
    <button onclick="getIrrigation()">Öneri Al</button>

    <!--Uyarı Mesajı-->
    <h2>Hava Uyarısı</h2>
    <select id="alertFieldSelect"></select>
    <button onclick="getAlert()">Uyarı Al</button>

    <script src="script.js"></script>

</body>    
</html>
