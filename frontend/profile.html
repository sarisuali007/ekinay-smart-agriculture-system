<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Profil Ayarları</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container page-shell">
        <header class="dashboard-topbar">
            <div>
                <h1>Profil Ayarları</h1>
                <p>Hesap bilgilerinizi buradan düzenleyin.</p>
            </div>

            <div class="dashboard-topbar-actions">
                <button onclick="window.location.href='dashboard.html'">Dashboard</button>
                <button onclick="logout()">Çıkış Yap</button>
            </div>
        </header>

        <div id="messageBox"></div>

        <section class="card profile-page-card">
            <h2>Profil Bilgileri</h2>

            <div class="form-group">
                <input id="updateName" placeholder="Yeni Ad">
                <input id="updateEmail" placeholder="Yeni Email">
                <input id="updatePassword" placeholder="Yeni Şifre">
                <div class="inline-actions">
                    <button onclick="updateProfile()">Profili Güncelle</button>
                    <button onclick="deleteProfile()">Profili Sil</button>
                </div>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
