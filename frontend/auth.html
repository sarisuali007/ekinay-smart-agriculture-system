<!DOCTYPE html>
<html lang="tr">

<head>

    <meta charset="UTF-8">
    <title>Ekinay Dashboard</title>
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="container">

        <header class="hero">
            <h1>Ekinay Giriş</h1>
            <p>Hesabınıza giriş yapın veya yeni bir hesap oluşturarak tarım panelinize erişin.</p>
            <div class="hero-actions">
                <button onclick="showAuthSection()">Giriş / Kayıt</button>
                <button onclick="window.location.href='index.html'">Ana Sayfa</button>
            </div>
        </header>

        <div id="messageBox"></div>

        <section class="card" id="authSection">
            <h2><h2>Giriş Yap veya Kayıt Ol</h2></h2>

            <div class="form-group hidden" id="registerPanel">
                <h3>Kullanıcı Kaydı</h3>
                <input type="text" id="registerName" placeholder="Ad">
                <input type="email" id="registerEmail" placeholder="Email">
                <input type="password" id="registerPassword" placeholder="Şifre">
                <button onclick="register()">Kayıt Ol</button>
            </div>

            <div class="form-group">
                <h3>Kullanıcı Girişi</h3>
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Şifre">
                <button onclick="login()">Giriş Yap</button>
            </div>
            <p class="auth-switch-text">
                Üye değil misin?
                <button type="button" class="link-like-button" onclick="toggleRegisterPanel()">Kayıt Ol</button>
            </p>
        </section>

    </div>

    <script src="script.js"></script>
</body>

</html>
