openapi: 3.0.3
info:
  title: Ekinay Smart Agriculture API
  version: 1.0.0
  description: Ekinay; kullanıcı, tarla, ürün, sulama önerisi, hava riski uyarısı, mobil push bildirimi, RabbitMQ ve Redis
    destekli otomatik alarm akışlarını yöneten REST API yapısıdır.
  contact:
    name: Ali SARISU
    email: alisarisu007@gmail.com
servers:
- url: http://localhost:3000
  description: Local development server
- url: https://ekinay-smart-agriculture-system.onrender.com
  description: Render production REST API
tags:
- name: System
  description: API çalışma kontrolü
- name: Authentication
  description: Kullanıcı kayıt ve giriş işlemleri
- name: Users
  description: Kullanıcı profil, silme ve mobil push token işlemleri
- name: Fields
  description: Tarla yönetimi
- name: Crops
  description: Ürün yönetimi
- name: Recommendations
  description: Sulama önerileri ve hava uyarıları
- name: Push
  description: Mobil push bildirim test işlemleri
- name: Auto Alerts
  description: Otomatik hava riski taraması ve bildirim sistemi
- name: RabbitMQ
  description: RabbitMQ kuyruğu üzerinden bildirim testi
paths:
  /:
    get:
      tags:
      - System
      summary: API çalışma kontrolü
      operationId: getApiHealth
      responses:
        '200':
          description: API çalışıyor
          content:
            text/plain:
              schema:
                type: string
              example: Ekinay API is running
  /auth/register:
    post:
      tags:
      - Authentication
      summary: Kullanıcı kaydı oluşturma
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: Ali SARISU
              email: ali@test.com
              password: '123456'
      responses:
        '201':
          description: Kayıt işlemi başarılı
        '400':
          description: Eksik bilgi veya kayıtlı e-posta
        '500':
          description: Sunucu hatası
  /auth/login:
    post:
      tags:
      - Authentication
      summary: Kullanıcı girişi
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: ali@test.com
              password: '123456'
      responses:
        '200':
          description: Giriş başarılı
        '401':
          description: E-posta veya şifre hatalı
        '500':
          description: Sunucu hatası
  /users/{userId}:
    get:
      tags:
      - Users
      summary: Kullanıcı profil bilgisini getir
      operationId: getUserById
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Kullanıcı bilgileri getirildi
        '404':
          description: Kullanıcı bulunamadı
    put:
      tags:
      - Users
      summary: Kullanıcı profil bilgisini güncelle
      operationId: updateUser
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
            example:
              name: Ali Güncel
              email: aliguncel@test.com
              password: '654321'
      responses:
        '200':
          description: Kullanıcı güncellendi
        '400':
          description: Geçersiz bilgi veya e-posta başka kullanıcıda
        '404':
          description: Kullanıcı bulunamadı
    delete:
      tags:
      - Users
      summary: Kullanıcıyı ve bağlı verileri sil
      operationId: deleteUser
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: Kullanıcı ve bağlı tarla/ürün bilgileri silindi
        '404':
          description: Kullanıcı bulunamadı
  /users/{userId}/push-token:
    put:
      tags:
      - Users
      summary: Mobil push token kaydet
      operationId: savePushToken
      parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PushTokenRequest'
            example:
              expoPushToken: ExponentPushToken[xxxxxxxxxxxxxxxxxxxxxx]
              pushAlertsEnabled: true
      responses:
        '200':
          description: Push token kaydedildi
        '404':
          description: Kullanıcı bulunamadı
  /fields:
    get:
      tags:
      - Fields
      summary: Kullanıcı tarlalarını listele
      operationId: listFields
      parameters:
      - $ref: '#/components/parameters/UserIdQuery'
      responses:
        '200':
          description: Tarlalar listelendi
        '400':
          description: Kullanıcı bilgisi zorunludur
    post:
      tags:
      - Fields
      summary: Yeni tarla ekle
      operationId: createField
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FieldRequest'
      responses:
        '201':
          description: Tarla oluşturuldu
        '400':
          description: Eksik bilgi
        '500':
          description: Tarla eklenemedi
  /fields/{fieldId}:
    put:
      tags:
      - Fields
      summary: Tarla güncelle
      operationId: updateField
      parameters:
      - name: fieldId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FieldRequest'
      responses:
        '200':
          description: Tarla güncellendi
        '404':
          description: Tarla bulunamadı
    delete:
      tags:
      - Fields
      summary: Tarla ve bağlı ürünleri sil
      operationId: deleteField
      parameters:
      - name: fieldId
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/UserIdQuery'
      responses:
        '200':
          description: Tarla ve tarlaya bağlı ürün kayıtları silindi
        '404':
          description: Tarla bulunamadı
  /crops:
    get:
      tags:
      - Crops
      summary: Kullanıcı ürünlerini listele
      operationId: listCrops
      parameters:
      - $ref: '#/components/parameters/UserIdQuery'
      responses:
        '200':
          description: Ürünler listelendi; fieldId null olan kayıtlar döndürülmez
        '400':
          description: Kullanıcı bilgisi zorunludur
    post:
      tags:
      - Crops
      summary: Yeni ürün ekle
      operationId: createCrop
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CropRequest'
      responses:
        '201':
          description: Ürün oluşturuldu
        '400':
          description: Eksik veya geçersiz ürün bilgisi
        '404':
          description: İlgili tarla bulunamadı
  /crops/{cropId}:
    put:
      tags:
      - Crops
      summary: Ürün güncelle
      operationId: updateCrop
      parameters:
      - name: cropId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CropRequest'
      responses:
        '200':
          description: Ürün güncellendi
        '404':
          description: Ürün veya tarla bulunamadı
    delete:
      tags:
      - Crops
      summary: Ürün sil
      operationId: deleteCrop
      parameters:
      - name: cropId
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/UserIdQuery'
      responses:
        '200':
          description: Ürün silindi
        '404':
          description: Ürün bulunamadı
  /recommendations/irrigation/{fieldId}:
    get:
      tags:
      - Recommendations
      summary: Sulama önerisi al
      operationId: getIrrigationRecommendation
      parameters:
      - name: fieldId
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/UserIdQuery'
      responses:
        '200':
          description: Sulama önerisi üretildi
        '400':
          description: Kullanıcı bilgisi zorunludur
        '404':
          description: Tarla veya ürün bulunamadı
  /recommendations/alerts/{fieldId}:
    get:
      tags:
      - Recommendations
      summary: Hava riski uyarısı al
      operationId: getWeatherAlertRecommendation
      parameters:
      - name: fieldId
        in: path
        required: true
        schema:
          type: string
      - $ref: '#/components/parameters/UserIdQuery'
      responses:
        '200':
          description: Hava riski uyarısı üretildi
        '400':
          description: Kullanıcı bilgisi zorunludur
        '404':
          description: Tarla veya ürün bulunamadı
  /test-push/run:
    post:
      tags:
      - Push
      summary: Gerçek telefona test bildirimi gönder
      operationId: runTestPush
      parameters:
      - $ref: '#/components/parameters/SecretHeader'
      - $ref: '#/components/parameters/SecretQuery'
      responses:
        '200':
          description: Test bildirimi gönderildi
        '403':
          description: Yetkisiz istek
        '404':
          description: Push token veya test tarlası bulunamadı
  /auto-alerts/run:
    post:
      tags:
      - Auto Alerts
      summary: Otomatik hava riski taraması çalıştır
      operationId: runAutoAlerts
      parameters:
      - $ref: '#/components/parameters/SecretHeader'
      - $ref: '#/components/parameters/SecretQuery'
      responses:
        '200':
          description: Otomatik tarama tamamlandı
        '403':
          description: Yetkisiz istek
  /rabbit-test/push:
    post:
      tags:
      - RabbitMQ
      summary: RabbitMQ üzerinden test push mesajı kuyruğa gönder
      operationId: runRabbitPushTest
      parameters:
      - $ref: '#/components/parameters/SecretHeader'
      - $ref: '#/components/parameters/SecretQuery'
      responses:
        '200':
          description: Mesaj kuyruğa gönderildi
        '403':
          description: Yetkisiz istek
components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        message:
          type: string
    User:
      type: object
      properties:
        _id:
          type: string
        name:
          type: string
        email:
          type: string
        password:
          type: string
        expoPushToken:
          type: string
        pushAlertsEnabled:
          type: boolean
    RegisterRequest:
      type: object
      required:
      - name
      - email
      - password
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
        password:
          type: string
    UserUpdateRequest:
      type: object
      required:
      - name
      - email
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
          description: Opsiyoneldir. Boş gönderilirse mevcut şifre korunur.
    PushTokenRequest:
      type: object
      properties:
        expoPushToken:
          type: string
        pushAlertsEnabled:
          type: boolean
    PolygonPoint:
      type: object
      required:
      - lat
      - lng
      properties:
        lat:
          type: number
        lng:
          type: number
    FieldRequest:
      type: object
      required:
      - userId
      - name
      - location
      - latitude
      - longitude
      - polygon
      properties:
        userId:
          type: string
        name:
          type: string
        location:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        areaM2:
          type: number
        isGreenhouse:
          type: boolean
        polygon:
          type: array
          minItems: 3
          items:
            $ref: '#/components/schemas/PolygonPoint'
    Field:
      allOf:
      - $ref: '#/components/schemas/FieldRequest'
      - type: object
        properties:
          _id:
            type: string
    CropRequest:
      type: object
      required:
      - userId
      - name
      - fieldId
      - sowingDate
      properties:
        userId:
          type: string
        name:
          type: string
          enum:
          - domates
          - biber
          - salatalık
          - fasulye
        fieldId:
          type: string
        sowingDate:
          type: string
          example: '2026-05-16'
    Crop:
      allOf:
      - $ref: '#/components/schemas/CropRequest'
      - type: object
        properties:
          _id:
            type: string
    AutoAlertSummary:
      type: object
      properties:
        checkedUserCount:
          type: integer
        checkedFieldCount:
          type: integer
        skippedNoCropCount:
          type: integer
        noRiskCount:
          type: integer
        alreadySentCount:
          type: integer
        failedPushCount:
          type: integer
        sentCount:
          type: integer
        queuedToRabbitMqCount:
          type: integer
        directPushCount:
          type: integer
  parameters:
    UserIdQuery:
      name: userId
      in: query
      required: true
      schema:
        type: string
      description: İşlemin yapılacağı kullanıcı ID değeri
    SecretHeader:
      name: x-auto-alert-secret
      in: header
      required: false
      schema:
        type: string
      description: AUTO_ALERT_SECRET değeri
    SecretQuery:
      name: secret
      in: query
      required: false
      schema:
        type: string
      description: AUTO_ALERT_SECRET değeri
