openapi: 3.0.3
info:
  title: Ekinay Smart Agriculture API
  version: 1.0.0
  description: |
    Ekinay sistemi kullanıcıların tarla ve ürün yönetimi yapmasını sağlar.
    Sistem ayrıca hava verilerini analiz ederek sulama önerileri üretir
    ve riskli hava koşullarında uyarı oluşturur.
  contact:
    name: Ali Sarısu
    email: alisarisu007@gmail.com

servers:
  - url: http://localhost:3000
    description: Development server

tags:
  - name: Authentication
    description: Kullanıcı kayıt ve giriş işlemleri
  - name: Users
    description: Kullanıcı profil işlemleri
  - name: Fields
    description: Tarla yönetimi
  - name: Crops
    description: Ürün yönetimi
  - name: Irrigation
    description: Sulama önerileri
  - name: Alerts
    description: Hava riski uyarıları

security:
  - BearerAuth: []

paths:

  /api/auth/register:
    post:
      tags:
        - Authentication
      summary: Kullanıcı Kaydı Oluşturma
      description: Yeni kullanıcıların sisteme kayıt olmasını sağlar
      operationId: registerUser

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            example:
              name: Ahmet Yılmaz
              email: ahmet@example.com
              password: 123456

      responses:
        "201":
          description: Kullanıcı başarıyla oluşturuldu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

        "400":
          description: Geçersiz veri
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

        "500":
          description: Sunucu hatası

  /api/auth/login:
    post:
      tags:
        - Authentication
      summary: Kullanıcı Girişi Yapma
      operationId: loginUser

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            example:
              email: ahmet@example.com
              password: 123456

      responses:
        "200":
          description: Giriş başarılı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'

        "401":
          description: Hatalı giriş
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /api/users/{userId}:
    put:
      tags:
        - Users
      summary: Profil Güncelleme
      operationId: updateUser

      parameters:
        - name: userId
          in: path
          required: true
          description: Kullanıcı ID
          schema:
            type: string

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'

      responses:
        "200":
          description: Profil güncellendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

        "404":
          description: Kullanıcı bulunamadı

  /api/fields:
    post:
      tags:
        - Fields
      summary: Tarla Ekleme
      operationId: createField

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FieldRequest'
            example:
              location: Antalya
              type: Wheat

      responses:
        "201":
          description: Tarla oluşturuldu
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Field'

        "400":
          description: Geçersiz veri

    get:
      tags:
        - Fields
      summary: Tarlaları Listeleme
      operationId: getFields

      responses:
        "200":
          description: Tarla listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Field'

  /api/fields/{fieldId}:
    put:
      tags:
        - Fields
      summary: Tarla Güncelleme
      operationId: updateField

      parameters:
        - name: fieldId
          in: path
          required: true
          schema:
            type: string

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FieldRequest'

      responses:
        "200":
          description: Tarla güncellendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Field'

        "404":
          description: Tarla bulunamadı

    delete:
      tags:
        - Fields
      summary: Tarla Silme
      operationId: deleteField

      parameters:
        - name: fieldId
          in: path
          required: true
          schema:
            type: string

      responses:
        "204":
          description: Tarla silindi

        "404":
          description: Tarla bulunamadı

  /api/crops:
    post:
      tags:
        - Crops
      summary: Ürün Ekleme
      operationId: createCrop

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CropRequest'
            example:
              fieldId: field1
              cropName: Wheat
              plantingDate: 2026-03-01

      responses:
        "201":
          description: Ürün eklendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Crop'

  /api/crops/{cropId}:
    put:
      tags:
        - Crops
      summary: Ürün Güncelleme
      operationId: updateCrop

      parameters:
        - name: cropId
          in: path
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Ürün güncellendi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Crop'

    delete:
      tags:
        - Crops
      summary: Ürün Silme
      operationId: deleteCrop

      parameters:
        - name: cropId
          in: path
          required: true
          schema:
            type: string

      responses:
        "204":
          description: Ürün silindi

  /api/irrigation/{fieldId}:
    get:
      tags:
        - Irrigation
      summary: Sulama Önerisi Oluşturma
      operationId: irrigationRecommendation

      parameters:
        - name: fieldId
          in: path
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Sulama önerisi
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Irrigation'

  /api/alerts/{fieldId}:
    get:
      tags:
        - Alerts
      summary: Hava Riski Uyarısı Oluşturma
      operationId: weatherAlert

      parameters:
        - name: fieldId
          in: path
          required: true
          schema:
            type: string

      responses:
        "200":
          description: Hava riski uyarısı
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Alert'

components:

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string

    RegisterRequest:
      type: object
      required:
        - name
        - email
        - password
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: '#/components/schemas/User'

    UserUpdateRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string

    Field:
      type: object
      properties:
        id:
          type: string
        location:
          type: string
        type:
          type: string

    FieldRequest:
      type: object
      properties:
        location:
          type: string
        type:
          type: string

    Crop:
      type: object
      properties:
        id:
          type: string
        fieldId:
          type: string
        cropName:
          type: string
        plantingDate:
          type: string

    CropRequest:
      type: object
      properties:
        fieldId:
          type: string
        cropName:
          type: string
        plantingDate:
          type: string
          format: date

    Irrigation:
      type: object
      properties:
        irrigationNeeded:
          type: boolean
        recommendedAmount:
          type: number
        message:
          type: string

    Alert:
      type: object
      properties:
        riskType:
          type: string
        message:
          type: string

    Error:
      type: object
      properties:
        message:
          type: string